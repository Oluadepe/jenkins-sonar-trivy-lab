services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - jenkins-sonar-trivy-lab_sonarqube_data:/opt/sonarqube/data
      - jenkins-sonar-trivy-lab_sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

  docker-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: docker-agent
    depends_on:
      - jenkins
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=docker-agent-1
      - JENKINS_SECRET=aae0b3fee5c3f6cb5b13a287a48b8e0ab516fc742a7d6d7a91fe31a053993f6a
      - JENKINS_WEB_SOCKET=true
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy-cache:/root/.cache/
    restart: unless-stopped

volumes:
  jenkins_home:
    external: true
  jenkins-sonar-trivy-lab_sonarqube_data:
    external: true
  jenkins-sonar-trivy-lab_sonarqube_extensions:
    external: true
  trivy-cache:
    external: true